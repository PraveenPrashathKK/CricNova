<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CricNova | Login | Learn.Experience.Cricket🏏</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="icon" href="icon.png" type="image/png">
  <style>
    :root {
      --navy:     #050f2e;
      --navy-mid: #0a1f4e;
      --gold:     #f5c518;
      --gold-dim: #c9a014;
      --cyan:     #00d4d4;
      --white:    #f0f4ff;
      --muted:    #8fa8cc;
    }

    *{ box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:  #050f2e;
      position: relative;
      overflow: hidden;
    }


    .bg {
      position: fixed;
      inset: 0;
      background-image: url('https://images.unsplash.com/photo-1540747913346-19e32dc3e97e?w=1600&q=80');
      background-size: cover;
      background-position: center;
      filter: brightness(35%) saturate(80%);
      z-index: 0;
    }


    .bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(5,15,46,0.75) 0%, rgba(10,31,78,0.5) 100%);
    }

    
    .login-card {
      position: relative;
      z-index: 1;
      width: 420px;
      background: rgba(5, 15, 46, 0.82);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(245, 197, 24, 0.18);
      border-radius: 22px;
      padding: 48px 44px 44px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.6);
    }

    
    .brand {
      text-align: center;
      margin-bottom: 32px;
    }

    .brand h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 38px;
      letter-spacing: 5px;
      color: var(--gold);
      line-height: 1;
    }

    .brand p {
      font-size: 12px;
      letter-spacing: 3px;
      color: var(--cyan);
      margin-top: 6px;
      text-transform: uppercase;
    }

    .divider {
      width: 48px;
      height: 2px;
      background: var(--gold);
      margin: 14px auto 0;
      border-radius: 2px;
    }
   
    .login-card h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 26px;
      letter-spacing: 2px;
      color: var(--white);
      margin-bottom: 24px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap i {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 14px;
      pointer-events: none;
      transition: color 0.25s;
    }

    .input-wrap input {
      width: 100%;
      padding: 13px 16px 13px 44px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(143, 168, 204, 0.25);
      border-radius: 10px;
      color: var(--white);
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.25s, background 0.25s;
    }

    .input-wrap input::placeholder { color: rgba(143,168,204,0.5); }

    .input-wrap input:focus {
      border-color: var(--gold);
      background: rgba(245, 197, 24, 0.05);
    }

    .input-wrap input:focus + i,
    .input-wrap:focus-within i {
      color: var(--gold);
    }

    .input-wrap i { z-index: 1; }

    .form-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 26px;
      margin-top: 4px;
    }

    .remember {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .remember input[type="checkbox"] {
      accent-color: var(--gold);
      width: 15px;
      height: 15px;
      cursor: pointer;
    }

    .remember span {
      font-size: 13px;
      color: var(--muted);
    }

    .forgot {
      font-size: 13px;
      color: var(--cyan);
      text-decoration: none;
      transition: color 0.2s;
    }

    .forgot:hover { color: var(--gold); }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: var(--gold);
      color:  #050f2e;
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 1px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.25s, box-shadow 0.25s, transform 0.15s;
    }

    .btn-login:hover {
      background: var(--gold-dim);
      box-shadow: 0 0 20px rgba(245, 197, 24, 0.35);
      transform: translateY(-1px);
    }

    .btn-login:active { transform: translateY(0); }

    .separator {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 22px 0;
    }

    .separator hr {
      flex: 1;
      border: none;
      border-top: 1px solid rgba(143,168,204,0.18);
    }

    .separator span {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 1px;
    }

    .social-login {
      display: flex;
      gap: 12px;
    }

    .btn-social {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 11px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(143,168,204,0.2);
      border-radius: 10px;
      color: var(--white);
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.25s, border-color 0.25s;
    }

    .btn-social:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(245,197,24,0.3);
    }

    .btn-social i { font-size: 16px; }
    .btn-social .fa-google { color: #ea4335; }
    .btn-social .fa-facebook { color: #1877f2; }

    .signup-link {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: var(--muted);
    }

    .signup-link a {
      color: var(--gold);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
    }

    .signup-link a:hover { color: var(--gold-dim); }

    .back-link {
      position: fixed;
      top: 24px;
      left: 28px;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: var(--white);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.5px;
      opacity: 0.75;
      transition: opacity 0.2s, color 0.2s;
    }

    .back-link:hover { opacity: 1; color: var(--gold); }
    .back-link i { font-size: 12px; }
  </style>
</head>
<body>

  <div class="bg"></div>

  <a href="index.html" class="back-link">
    <i class="fas fa-arrow-left"></i> Back to CRICNOVA
  </a>

  <div class="login-card">

    <div class="brand">
      <h1>CRICNOVA</h1>
      <p>The Cricket Destination</p>
      <div class="divider"></div>
    </div>
    <div class="form-group">
      <label>Email Address</label>
      <div class="input-wrap">
        <i class="fas fa-envelope"></i>
        <input type="email" placeholder="you@example.com">
      </div>
    </div>

    <div class="form-group">
      <label>Password</label>
      <div class="input-wrap">
        <i class="fas fa-lock"></i>
        <input type="password" placeholder="Enter your password">
      </div>
    </div>

    <div class="form-row">
      <label class="remember">
        <input type="checkbox">
        <span>Remember me</span>
      </label>
      <a href="#" class="forgot">Forgot password?</a>
    </div>
    <button class="btn-login"><i class="fa-solid fa-arrow-right-to-bracket"></i>  LOGIN</button>
    <div class="separator">
      <hr><span>OR CONTINUE WITH</span><hr>
    </div>
    <div class="social-login">
      <a href="https://accounts.google.com/v3/signin/identifier?dsh=S1812573153%3A1655944654029516&flowEntry=ServiceLogin&flowName=WebLiteSignIn&ifkv=AX3vH39E0iYVTmn-NoMNM_C35EPrno8LWsRx2Qhr0HApkVLZ-Zc_Vql8ouaSQOiXzEmthrpOPAV5" target="_blank" class="btn-social">
        <i class="fab fa-google"></i> Google
      </a>
      <a href="https://www.facebook.com/" target="_blank" class="btn-social">
        <i class="fab fa-facebook"></i> Facebook
      </a>
    </div>
    <div class="signup-link">
      Don't have an account? <a href="#">Sign Up</a>
    </div>
  </div>

<script>
  const emailInput = document.querySelector('input[type="email"]');
  const passwordInput = document.querySelector('input[type="password"]');
  const loginBtn = document.querySelector('.btn-login');

  const emailErr = document.createElement('p');
  emailErr.style.cssText = 'color:#ff4d4d;font-size:12px;margin-top:6px;padding-left:4px;display:none;';
  emailInput.closest('.input-wrap').after(emailErr);

  const passErr = document.createElement('p');
  passErr.style.cssText = 'color:#ff4d4d;font-size:12px;margin-top:6px;padding-left:4px;display:none;';
  passwordInput.closest('.input-wrap').after(passErr);

  function showError(el, msg) {
    el.textContent = msg;
    el.style.display = 'block';
  }

  function clearError(el) {
    el.textContent = '';
    el.style.display = 'none';
  }
  emailInput.addEventListener('input', () => clearError(emailErr));
  passwordInput.addEventListener('input', () => clearError(passErr));

  loginBtn.addEventListener('click', () => {
    let valid = true;

    const email = emailInput.value.trim();
    const password = passwordInput.value.trim();

    if (email === '') {
      showError(emailErr, 'Email address is required.');
      valid = false;
    } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      showError(emailErr, 'Please enter a valid email address.');
      valid = false;
    } else {
      clearError(emailErr);
    }

    if (password === '') {
      showError(passErr, 'Password is required.');
      valid = false;
    } else if (password.length < 6) {
      showError(passErr, 'Password must be at least 6 characters.');
      valid = false;
    } else {
      clearError(passErr);
    }

    if (valid) {
      loginBtn.textContent = '✓ LOGGED IN';
      loginBtn.style.background = '#00c48c';
      loginBtn.style.color = '#fff';
    }
  });
</script>
</body>
</html>
